<title>ASCEND</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@500;700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #05060c; --bg-2: #0a0e1a; --bg-3: #111726;
  --border: #1a2238; --border-bright: #2a3a5c;
  --cyan: #05f2db; --cyan-dim: #038c80;
  --magenta: #f041ff; --magenta-dim: #8a25a3;
  --amber: #ffb627; --orange: #ff6b35;
  --ink: #c8d4ec; --ink-dim: #6478a0; --ink-faint: #3a4868;
  --ok: #00ff9c; --bad: #ff3860; --gold: #ffd93d;
  --accent: var(--cyan); --accent-dim: var(--cyan-dim);
}
body.profile-loss { --accent: var(--orange); --accent-dim: #b34721; }
body.profile-gain { --accent: var(--cyan); --accent-dim: var(--cyan-dim); }

@keyframes scan { 0%{transform:translateY(-100%);} 100%{transform:translateY(100vh);} }
@keyframes flicker { 0%,100%{opacity:1;} 43%{opacity:0.92;} 44%{opacity:1;} }
@keyframes fade-in { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
@keyframes timer-pulse { 0%,100%{box-shadow:0 0 8px rgba(255,107,53,0.3);} 50%{box-shadow:0 0 18px rgba(255,107,53,0.6);} }
@keyframes xp-fill { from{width:0;} }
@keyframes pop { 0%{transform:scale(0.8);opacity:0;} 60%{transform:scale(1.08);} 100%{transform:scale(1);opacity:1;} }
@keyframes levelup-glow { 0%,100%{box-shadow:0 0 20px rgba(255,217,61,0.4);} 50%{box-shadow:0 0 40px rgba(255,217,61,0.7);} }
@keyframes badge-shine { 0%{background-position:-200% center;} 100%{background-position:200% center;} }

html, body {
  background: var(--bg); color: var(--ink);
  font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.5;
  overscroll-behavior: none; -webkit-font-smoothing: antialiased;
  min-height: 100vh; min-height: 100dvh;
}
body {
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  background-image:
    linear-gradient(rgba(5,242,219,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(5,242,219,0.012) 1px, transparent 1px),
    radial-gradient(ellipse at top, rgba(240,65,255,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at bottom, rgba(5,242,219,0.04) 0%, transparent 50%);
  background-size: 32px 32px, 32px 32px, 100% 100%, 100% 100%;
  position: relative;
}
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:100; background: linear-gradient(to bottom, transparent 0%, rgba(5,242,219,0.03) 50%, transparent 100%); height:200px; animation: scan 8s linear infinite; }
body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:1; background: repeating-linear-gradient(0deg, transparent 0px, rgba(0,0,0,0.15) 1px, transparent 2px, transparent 3px); opacity:0.4; }
#app { max-width: 480px; margin: 0 auto; padding: 0 16px 100px; position: relative; z-index: 2; }

/* === PROFILE SELECT === */
.profile-select { padding: 60px 0 20px; animation: fade-in 0.4s; }
.profile-logo { text-align: center; margin-bottom: 8px; }
.profile-logo-mark { font-family:'Orbitron',monospace; font-weight:900; font-size:42px; letter-spacing:0.12em; color:var(--cyan); text-shadow:0 0 20px rgba(5,242,219,0.4); }
.profile-logo-sub { font-size:10px; letter-spacing:0.4em; color:var(--ink-dim); text-transform:uppercase; margin-top:4px; }
.profile-prompt { text-align:center; font-size:11px; letter-spacing:0.2em; color:var(--ink-dim); text-transform:uppercase; margin:40px 0 16px; }
.profile-card { padding:18px; margin-bottom:12px; background:var(--bg-2); border:1px solid var(--border); cursor:pointer; transition:all 0.15s; position:relative; overflow:hidden; }
.profile-card:hover { border-color:var(--border-bright); }
.profile-card.gain:hover { border-color:var(--cyan-dim); box-shadow:0 0 16px rgba(5,242,219,0.1); }
.profile-card.loss:hover { border-color:#b34721; box-shadow:0 0 16px rgba(255,107,53,0.1); }
.profile-card-head { display:flex; align-items:center; gap:14px; margin-bottom:10px; }
.profile-avatar { width:48px; height:48px; border:2px solid var(--border-bright); display:flex; align-items:center; justify-content:center; font-family:'Orbitron',monospace; font-weight:900; font-size:20px; flex-shrink:0; }
.profile-card.gain .profile-avatar { border-color:var(--cyan); color:var(--cyan); text-shadow:0 0 8px rgba(5,242,219,0.4); }
.profile-card.loss .profile-avatar { border-color:var(--orange); color:var(--orange); text-shadow:0 0 8px rgba(255,107,53,0.4); }
.profile-card-name { font-family:'Orbitron',monospace; font-weight:700; font-size:18px; color:var(--ink); }
.profile-card-class { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; margin-top:2px; }
.profile-card.gain .profile-card-class { color:var(--cyan); }
.profile-card.loss .profile-card-class { color:var(--orange); }
.profile-card-stats { display:flex; gap:16px; font-size:10px; color:var(--ink-dim); letter-spacing:0.1em; }
.profile-card-stats .lvl { color:var(--gold); }
.profile-card-desc { font-size:11px; color:var(--ink-dim); line-height:1.5; margin-top:8px; }
.profile-new { padding:16px; border:1px dashed var(--border-bright); text-align:center; cursor:pointer; color:var(--ink-dim); font-size:11px; letter-spacing:0.15em; text-transform:uppercase; transition:all 0.15s; }
.profile-new:hover { border-color:var(--cyan-dim); color:var(--cyan); }

/* === HEADER / HUD === */
.hud { padding:16px 0 12px; border-bottom:1px solid var(--border); margin-bottom:14px; }
.hud-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.hud-profile { display:flex; align-items:center; gap:10px; cursor:pointer; }
.hud-avatar { width:36px; height:36px; border:2px solid var(--accent); display:flex; align-items:center; justify-content:center; font-family:'Orbitron',monospace; font-weight:900; font-size:15px; color:var(--accent); text-shadow:0 0 8px currentColor; flex-shrink:0; }
.hud-name { font-family:'Orbitron',monospace; font-weight:700; font-size:14px; color:var(--ink); line-height:1; }
.hud-class { font-size:9px; letter-spacing:0.12em; color:var(--accent); text-transform:uppercase; margin-top:3px; }
.hud-switch { font-size:9px; letter-spacing:0.15em; color:var(--ink-dim); text-transform:uppercase; border:1px solid var(--border); padding:6px 10px; background:transparent; cursor:pointer; font-family:'JetBrains Mono',monospace; }
.hud-switch:hover { border-color:var(--accent-dim); color:var(--accent); }

/* LEVEL + XP */
.level-bar { display:flex; align-items:center; gap:12px; }
.level-badge { font-family:'Orbitron',monospace; font-weight:900; font-size:11px; color:var(--gold); text-shadow:0 0 8px rgba(255,217,61,0.4); white-space:nowrap; display:flex; flex-direction:column; align-items:center; line-height:1; }
.level-badge .lvl-num { font-size:24px; }
.level-badge .lvl-label { font-size:8px; letter-spacing:0.2em; color:var(--ink-dim); margin-top:2px; }
.xp-track { flex:1; }
.xp-bar { height:10px; background:var(--bg-3); border:1px solid var(--border); position:relative; overflow:hidden; }
.xp-fill { position:absolute; top:0; left:0; bottom:0; background:linear-gradient(90deg, var(--accent-dim), var(--accent)); box-shadow:0 0 10px var(--accent); transition:width 0.8s cubic-bezier(0.2,0.8,0.2,1); }
.xp-text { display:flex; justify-content:space-between; font-size:9px; letter-spacing:0.1em; color:var(--ink-dim); margin-top:4px; }
.xp-text .xp-val { color:var(--accent); }

/* TABS */
.tabs { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; margin-bottom:18px; }
.tab { padding:10px 4px; font-family:'JetBrains Mono',monospace; font-weight:500; background:transparent; border:1px solid var(--border); color:var(--ink-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.15s; }
.tab.active { color:var(--accent); border-color:var(--accent-dim); box-shadow:inset 0 0 12px rgba(5,242,219,0.06), 0 0 6px rgba(5,242,219,0.1); }
.tab:active { transform:scale(0.96); }

/* BANNER */
.banner { position:relative; padding:16px; border:1px solid var(--accent-dim); background:linear-gradient(135deg, rgba(5,242,219,0.06), rgba(240,65,255,0.03)); margin-bottom:14px; box-shadow:0 0 16px rgba(5,242,219,0.06); }
.banner.rest { border-color:var(--magenta-dim); background:linear-gradient(135deg, rgba(240,65,255,0.06), rgba(5,242,219,0.02)); }
.banner-corner { position:absolute; width:8px; height:8px; border:1px solid var(--accent); }
.banner.rest .banner-corner { border-color:var(--magenta); }
.banner-corner.tl{top:-1px;left:-1px;border-right:none;border-bottom:none;} .banner-corner.tr{top:-1px;right:-1px;border-left:none;border-bottom:none;}
.banner-corner.bl{bottom:-1px;left:-1px;border-right:none;border-top:none;} .banner-corner.br{bottom:-1px;right:-1px;border-left:none;border-top:none;}
.banner-id { font-size:9px; letter-spacing:0.2em; color:var(--ink-dim); margin-bottom:6px; text-transform:uppercase; }
.banner-title { font-family:'Orbitron',monospace; font-weight:700; font-size:21px; letter-spacing:0.06em; margin-bottom:4px; color:var(--accent); text-shadow:0 0 8px currentColor; }
.banner.rest .banner-title { color:var(--magenta); }
.banner-sub { font-size:11px; color:var(--ink-dim); }
.banner-reward { position:absolute; top:14px; right:14px; font-size:10px; font-family:'Orbitron',monospace; font-weight:700; color:var(--gold); text-shadow:0 0 6px rgba(255,217,61,0.4); background:var(--bg); border:1px solid rgba(255,217,61,0.3); padding:4px 8px; }
.banner-meta { position:absolute; bottom:14px; right:14px; font-size:9px; letter-spacing:0.12em; color:var(--ink-dim); text-transform:uppercase; }

/* QUESTS */
.quest-strip { display:flex; gap:6px; margin-bottom:18px; }
.quest-chip { flex:1; padding:10px 8px; background:var(--bg-2); border:1px solid var(--border); text-align:center; position:relative; }
.quest-chip.done { border-color:var(--ok); background:rgba(0,255,156,0.04); }
.quest-chip-icon { font-family:'Orbitron',monospace; font-weight:900; font-size:16px; color:var(--ink-dim); }
.quest-chip.done .quest-chip-icon { color:var(--ok); }
.quest-chip-label { font-size:8px; letter-spacing:0.1em; color:var(--ink-dim); text-transform:uppercase; margin-top:3px; }

.section-label { font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:var(--accent); margin:22px 0 12px; font-weight:700; display:flex; align-items:center; gap:10px; text-shadow:0 0 6px currentColor; }
.section-label::before { content:''; width:14px; height:1px; background:var(--accent); box-shadow:0 0 4px currentColor; }
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }
.section-label.cardio { color:var(--orange); }
.section-label .count { font-size:10px; color:var(--ink-dim); letter-spacing:0.1em; text-shadow:none; }

/* EXERCISE */
.ex-item { display:grid; grid-template-columns:28px 24px 1fr auto; gap:12px; align-items:flex-start; padding:12px 10px; margin-bottom:4px; background:var(--bg-2); border:1px solid var(--border); cursor:pointer; user-select:none; transition:all 0.15s; }
.ex-item:hover { border-color:var(--border-bright); }
.ex-item.done { background:rgba(0,255,156,0.03); border-color:rgba(0,255,156,0.2); }
.ex-num { font-family:'Orbitron',monospace; font-weight:700; font-size:14px; color:var(--magenta); text-shadow:0 0 4px rgba(240,65,255,0.3); text-align:right; padding-top:1px; }
.ex-item.done .ex-num { color:var(--ok); }
.ex-check { width:20px; height:20px; border:1.5px solid var(--ink-faint); position:relative; flex-shrink:0; margin-top:1px; transition:all 0.15s; }
.ex-item.done .ex-check { background:var(--ok); border-color:var(--ok); box-shadow:0 0 8px rgba(0,255,156,0.4); }
.ex-item.done .ex-check::after { content:''; position:absolute; top:3px; left:6px; width:5px; height:10px; border-right:2px solid var(--bg); border-bottom:2px solid var(--bg); transform:rotate(45deg); }
.ex-body { min-width:0; }
.ex-name { font-size:13px; font-weight:500; color:var(--ink); margin-bottom:3px; line-height:1.3; }
.ex-item.done .ex-name { color:var(--ink-dim); text-decoration:line-through; }
.ex-target { font-size:11px; color:var(--ink-dim); }
.ex-tag { display:inline-block; font-size:9px; padding:1px 6px; background:var(--bg-3); color:var(--magenta); border:1px solid var(--magenta-dim); margin-right:4px; letter-spacing:0.1em; text-transform:uppercase; }
.ex-tag.machine { color:var(--cyan); border-color:var(--cyan-dim); }
.ex-tag.cardio { color:var(--orange); border-color:#b34721; }
.ex-tip { font-size:10px; color:var(--ink-faint); margin-top:4px; line-height:1.4; font-style:italic; }
.ex-xp { font-size:9px; font-family:'Orbitron',monospace; font-weight:700; color:var(--gold); white-space:nowrap; padding-top:2px; }

/* === EXERCISE CARD (new set-based) === */
.exo { background:var(--bg-2); border:1px solid var(--border); margin-bottom:8px; transition:all 0.15s; }
.exo.done { border-color:rgba(0,255,156,0.25); }
.exo-head { display:grid; grid-template-columns:30px 1fr auto; gap:12px; align-items:flex-start; padding:14px 12px; }
.exo-num { font-family:'Orbitron',monospace; font-weight:900; font-size:18px; color:var(--magenta); text-shadow:0 0 6px rgba(240,65,255,0.3); line-height:1; padding-top:2px; }
.exo.done .exo-num { color:var(--ok); }
.exo-info { min-width:0; }
.exo-name { font-size:14px; font-weight:700; color:var(--ink); line-height:1.25; margin-bottom:5px; }
.exo-meta { display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
.exo-tag { font-size:9px; padding:2px 7px; letter-spacing:0.1em; text-transform:uppercase; font-weight:700; border:1px solid; }
.exo-tag.base { color:var(--gold); border-color:rgba(255,217,61,0.4); background:rgba(255,217,61,0.06); }
.exo-tag.machine { color:var(--cyan); border-color:var(--cyan-dim); }
.exo-tag.libre { color:var(--magenta); border-color:var(--magenta-dim); }
.exo-tag.cardio { color:var(--orange); border-color:#b34721; background:rgba(255,107,53,0.06); }
.exo-prescription { font-size:11px; color:var(--ink); font-weight:500; }
.exo-xp { font-family:'Orbitron',monospace; font-weight:700; font-size:10px; color:var(--gold); white-space:nowrap; padding-top:2px; }
.exo-tip { font-size:10px; color:var(--ink-faint); line-height:1.45; font-style:italic; padding:0 12px 12px 54px; margin-top:-4px; }
.exo-prev { font-size:10px; padding:0 12px 10px 54px; letter-spacing:0.03em; color:var(--ink-faint); }
.exo-prev .up { color:var(--ok); } .exo-prev .down { color:var(--amber); } .exo-prev .same { color:var(--ink-dim); }

/* EXERCISE VISUAL (illustration + boutons démo) */
.exo-viz { padding:4px 12px 14px 12px; display:flex; gap:12px; align-items:stretch; }
.exo-viz-svg { width:96px; height:96px; flex-shrink:0; background:radial-gradient(circle at 50% 40%, var(--bg-3), var(--bg-2)); border:1px solid var(--border-bright); border-radius:6px; display:flex; align-items:center; justify-content:center; }
.exo-viz-svg svg { width:100%; height:100%; display:block; }
.exo-viz-actions { flex:1; display:flex; flex-direction:column; gap:6px; justify-content:center; }
.exo-act-btn { display:flex; align-items:center; gap:9px; padding:11px 12px; background:var(--bg-3); border:1px solid var(--border-bright); color:var(--ink); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; font-weight:500; cursor:pointer; text-decoration:none; transition:all 0.15s; border-radius:4px; }
.exo-act-btn:hover { border-color:var(--accent-dim); color:var(--accent); background:var(--bg); }
.exo-act-btn:active { transform:scale(0.98); }
.exo-act-btn .ic { width:18px; height:18px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.exo-act-btn.video .ic { color:var(--orange); }
.exo-act-btn.machine .ic { color:var(--cyan); }
.exo-act-btn .lbl { flex:1; }
.exo-act-btn .arr { color:var(--ink-faint); font-size:11px; }

/* Animations d'illustration : mouvement aller-retour fluide (2.4s) */
.viz-press-arm { animation: vpress 2.4s ease-in-out infinite; transform-origin:62px 60px; }
@keyframes vpress { 0%,100%{transform:translateY(8px);} 50%{transform:translateY(-4px);} }
.viz-pull-arm { animation: vpull 2.4s ease-in-out infinite; transform-origin:60px 52px; }
@keyframes vpull { 0%,100%{transform:translateY(-6px);} 50%{transform:translateY(8px);} }
.viz-row-arm { animation: vrow 2.2s ease-in-out infinite; }
@keyframes vrow { 0%,100%{transform:translateX(6px);} 50%{transform:translateX(-8px);} }
.viz-squat { animation: vsquat 2.6s ease-in-out infinite; transform-origin:60px 60px; }
@keyframes vsquat { 0%,100%{transform:translateY(0) scaleY(1);} 50%{transform:translateY(8px) scaleY(0.86);} }
.viz-legpress { animation: vleg 2.4s ease-in-out infinite; transform-origin:50px 72px; }
@keyframes vleg { 0%,100%{transform:translate(8px,-6px);} 50%{transform:translate(0,0);} }
.viz-lunge { animation: vlunge 2.6s ease-in-out infinite; transform-origin:56px 68px; }
@keyframes vlunge { 0%,100%{transform:translateY(0);} 50%{transform:translateY(7px);} }
.viz-curl { animation: vcurl 2.2s ease-in-out infinite; transform-origin:50px 72px; }
@keyframes vcurl { 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(-42deg);} }
.viz-lateral { animation: vlat 2.6s ease-in-out infinite; transform-origin:60px 52px; }
@keyframes vlat { 0%,100%{transform:rotate(28deg) scale(0.9);} 50%{transform:rotate(0deg) scale(1);} }
.viz-triceps { animation: vtri 2.2s ease-in-out infinite; transform-origin:64px 64px; }
@keyframes vtri { 0%,100%{transform:scaleY(0.7);} 50%{transform:scaleY(1);} }
.viz-fly { animation: vfly 2.6s ease-in-out infinite; transform-origin:60px 56px; }
@keyframes vfly { 0%,100%{transform:scaleX(1);} 50%{transform:scaleX(0.55);} }
.viz-calf { animation: vcalf 1.8s ease-in-out infinite; transform-origin:60px 100px; }
@keyframes vcalf { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }
.viz-plank { animation: vbreathe 3.2s ease-in-out infinite; }
.viz-pushup { animation: vpushup 2.4s ease-in-out infinite; transform-origin:60px 80px; }
@keyframes vpushup { 0%,100%{transform:translateY(0);} 50%{transform:translateY(10px);} }
.viz-pedal { animation: vpedal 1.2s linear infinite; }
@keyframes vpedal { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
.viz-walk-leg { animation: vwalkleg 1s ease-in-out infinite; transform-origin:60px 76px; }
@keyframes vwalkleg { 0%,100%{transform:rotate(-16deg);} 50%{transform:rotate(16deg);} }
.viz-walk-arm { animation: vwalkarm 1s ease-in-out infinite; transform-origin:60px 52px; }
@keyframes vwalkarm { 0%,100%{transform:rotate(16deg);} 50%{transform:rotate(-16deg);} }
.viz-catcow { animation: vcatcow 3s ease-in-out infinite; transform-origin:60px 80px; }
@keyframes vcatcow { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px) scaleY(0.95);} }
.viz-breathe { animation: vbreathe 3.4s ease-in-out infinite; transform-origin:center; }
@keyframes vbreathe { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.04);opacity:0.82;} }

/* SET ROWS */
.sets { padding:0 12px 12px 12px; }
.set-head { display:grid; grid-template-columns:24px 1fr 1fr 26px; gap:8px; padding:0 4px 6px; font-size:8px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-faint); }
.set-head span:nth-child(3), .set-head span:nth-child(4) { text-align:center; }
.set-row { display:grid; grid-template-columns:24px 1fr 1fr 26px; gap:8px; align-items:center; padding:5px 4px; border-top:1px solid var(--border); }
.set-idx { font-family:'Orbitron',monospace; font-weight:700; font-size:12px; color:var(--ink-dim); text-align:center; }
.set-input { height:34px; background:var(--bg); border:1px solid var(--border-bright); color:var(--ink); font-family:'Orbitron',monospace; font-size:13px; font-weight:700; text-align:center; width:100%; }
.set-input:focus { border-color:var(--accent); }
.set-input::placeholder { color:var(--ink-faint); font-weight:400; }
.set-input.cardio-na { background:transparent; border:none; color:var(--ink-faint); font-size:11px; font-family:'JetBrains Mono',monospace; }
.set-check { width:26px; height:26px; border:1.5px solid var(--ink-faint); position:relative; cursor:pointer; margin:0 auto; transition:all 0.12s; }
.set-row.done .set-check { background:var(--ok); border-color:var(--ok); box-shadow:0 0 6px rgba(0,255,156,0.4); }
.set-row.done .set-check::after { content:''; position:absolute; top:5px; left:9px; width:5px; height:11px; border-right:2px solid var(--bg); border-bottom:2px solid var(--bg); transform:rotate(45deg); }
.set-row.done .set-input { opacity:0.6; }

/* CARDIO STEP (big, clear) */
.cardio-step { background:var(--bg-2); border:1px solid #b34721; border-left:3px solid var(--orange); margin-bottom:8px; padding:14px 12px; display:grid; grid-template-columns:30px 1fr 26px; gap:12px; align-items:flex-start; cursor:pointer; }
.cardio-step.done { background:rgba(0,255,156,0.03); border-color:rgba(0,255,156,0.25); border-left-color:var(--ok); }
.cardio-step-num { font-family:'Orbitron',monospace; font-weight:900; font-size:18px; color:var(--orange); line-height:1; padding-top:2px; }
.cardio-step.done .cardio-step-num { color:var(--ok); }
.cardio-step-name { font-size:14px; font-weight:700; color:var(--ink); margin-bottom:4px; }
.cardio-step-line { display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
.cardio-step-dur { font-family:'Orbitron',monospace; font-weight:900; font-size:20px; color:var(--orange); text-shadow:0 0 6px rgba(255,107,53,0.3); }
.cardio-step.done .cardio-step-dur { color:var(--ok); }
.cardio-step-intensity { font-size:11px; color:var(--ink); line-height:1.4; }
.cardio-step-tip { font-size:10px; color:var(--ink-faint); font-style:italic; margin-top:4px; line-height:1.4; }
.cardio-step-check { width:26px; height:26px; border:1.5px solid var(--ink-faint); position:relative; flex-shrink:0; }
.cardio-step.done .cardio-step-check { background:var(--ok); border-color:var(--ok); }
.cardio-step.done .cardio-step-check::after { content:''; position:absolute; top:5px; left:9px; width:5px; height:11px; border-right:2px solid var(--bg); border-bottom:2px solid var(--bg); transform:rotate(45deg); }

/* VALIDATE SESSION button */
.validate-zone { margin:20px 0 8px; }
.validate-btn { width:100%; padding:18px; background:linear-gradient(135deg, var(--accent-dim), var(--accent)); color:var(--bg); border:none; font-family:'Orbitron',monospace; font-size:14px; letter-spacing:0.12em; text-transform:uppercase; font-weight:900; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; box-shadow:0 0 16px var(--accent); }
.validate-btn:active { transform:scale(0.98); }
.validate-btn:disabled { background:var(--bg-2); color:var(--ink-faint); border:1px solid var(--border); box-shadow:none; cursor:not-allowed; }
.validate-btn .vb-sub { display:block; font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:400; letter-spacing:0.15em; margin-top:4px; opacity:0.8; }
.validate-done { width:100%; padding:18px; background:rgba(0,255,156,0.06); border:1px solid var(--ok); color:var(--ok); font-family:'Orbitron',monospace; font-size:14px; letter-spacing:0.12em; text-transform:uppercase; font-weight:900; text-align:center; }
.validate-done .vd-sub { display:block; font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:400; letter-spacing:0.15em; margin-top:4px; color:var(--ink-dim); }

/* COLLAPSE */
.collapse-btn { width:100%; padding:11px 14px; background:var(--bg-2); border:1px solid var(--border); color:var(--ink-dim); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; text-align:left; font-weight:500; display:flex; justify-content:space-between; align-items:center; transition:all 0.15s; margin-bottom:6px; }
.collapse-btn:hover { color:var(--accent); border-color:var(--accent-dim); }
.collapse-btn .arrow { color:var(--accent); transition:transform 0.2s; }
.collapse-btn.open .arrow { transform:rotate(90deg); }
.collapse-body { padding:14px; background:var(--bg-2); border:1px solid var(--border); border-top:none; margin-bottom:12px; margin-top:-6px; animation:fade-in 0.25s; }
.routine-item { display:grid; grid-template-columns:22px 1fr auto; gap:10px; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.routine-item:last-child { border-bottom:none; }
.routine-item .ex-check { width:18px; height:18px; margin-top:0; }
.routine-item.done .ex-check { background:var(--magenta); border-color:var(--magenta); box-shadow:0 0 6px rgba(240,65,255,0.4); }
.routine-item-name { font-size:12px; color:var(--ink); }
.routine-item.done .routine-item-name { color:var(--ink-dim); text-decoration:line-through; }
.routine-item-target { font-size:10px; color:var(--ink-dim); }

/* Cartes étirement/yoga riches */
.stretch-card { background:var(--bg-2); border:1px solid var(--border); border-radius:6px; margin-bottom:8px; overflow:hidden; transition:border-color 0.15s; }
.stretch-card.done { border-color:rgba(240,65,255,0.3); background:rgba(240,65,255,0.03); }
.stretch-head { display:grid; grid-template-columns:84px 1fr 26px; gap:12px; align-items:center; padding:12px; }
.stretch-svg { width:84px; height:84px; background:radial-gradient(circle at 50% 40%, var(--bg-3), var(--bg-2)); border:1px solid var(--border-bright); border-radius:6px; }
.stretch-svg svg { width:100%; height:100%; }
.stretch-info { min-width:0; }
.stretch-name { font-size:13px; font-weight:700; color:var(--ink); margin-bottom:3px; line-height:1.25; }
.stretch-card.done .stretch-name { color:var(--ink-dim); text-decoration:line-through; }
.stretch-target { font-family:'Orbitron',monospace; font-size:13px; font-weight:700; color:var(--magenta); margin-bottom:8px; }
.stretch-card.done .stretch-target { color:var(--ink-dim); }
.stretch-btns { display:flex; gap:6px; }
.stretch-btn { display:flex; align-items:center; gap:6px; padding:7px 10px; background:var(--bg-3); border:1px solid var(--border-bright); color:var(--ink); font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; font-weight:500; cursor:pointer; text-decoration:none; border-radius:4px; transition:all 0.15s; }
.stretch-btn:active { transform:scale(0.97); }
.stretch-btn.timer { border-color:var(--magenta-dim); color:var(--magenta); }
.stretch-btn.timer:hover { background:rgba(240,65,255,0.08); }
.stretch-btn.video { color:var(--orange); border-color:#b34721; }
.stretch-btn .ic { width:13px; height:13px; display:flex; }
.stretch-checkbox { width:26px; height:26px; border:1.5px solid var(--ink-faint); position:relative; cursor:pointer; align-self:flex-start; transition:all 0.12s; }
.stretch-card.done .stretch-checkbox { background:var(--magenta); border-color:var(--magenta); box-shadow:0 0 8px rgba(240,65,255,0.4); }
.stretch-card.done .stretch-checkbox::after { content:''; position:absolute; top:5px; left:9px; width:5px; height:11px; border-right:2px solid var(--bg); border-bottom:2px solid var(--bg); transform:rotate(45deg); }

/* Timer plein écran pour étirement/yoga */
.hold-timer-overlay { position:fixed; inset:0; z-index:500; background:rgba(5,6,12,0.96); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; animation:fade-in 0.2s; }
.hold-timer-svg { width:140px; height:140px; margin-bottom:20px; }
.hold-timer-svg svg { width:100%; height:100%; }
.hold-timer-name { font-family:'Orbitron',monospace; font-weight:700; font-size:18px; color:var(--ink); text-align:center; margin-bottom:6px; letter-spacing:0.05em; }
.hold-timer-side { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--magenta); margin-bottom:24px; }
.hold-ring-wrap { position:relative; width:200px; height:200px; margin-bottom:28px; }
.hold-ring-wrap svg { width:100%; height:100%; transform:rotate(-90deg); }
.hold-ring-bg { fill:none; stroke:var(--bg-3); stroke-width:8; }
.hold-ring-fg { fill:none; stroke:var(--magenta); stroke-width:8; stroke-linecap:round; transition:stroke-dashoffset 1s linear; filter:drop-shadow(0 0 6px var(--magenta)); }
.hold-ring-num { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Orbitron',monospace; font-weight:900; font-size:54px; color:var(--ink); }
.hold-timer-btns { display:flex; gap:10px; }
.hold-timer-btn { padding:13px 24px; background:var(--bg-2); border:1px solid var(--border-bright); color:var(--ink); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; font-weight:700; cursor:pointer; border-radius:4px; }
.hold-timer-btn.primary { border-color:var(--magenta); color:var(--magenta); }
.hold-timer-btn.done-btn { border-color:var(--ok); color:var(--ok); }

/* REST TIMER */
.rest-timer { padding:16px; background:var(--bg-2); border:1px solid var(--orange); margin-bottom:10px; box-shadow:0 0 12px rgba(255,107,53,0.08); transition:border-color 0.3s, box-shadow 0.3s; }
.rest-timer.warn { border-color:var(--amber); box-shadow:0 0 14px rgba(255,182,39,0.2); }
.rest-timer.urgent { border-color:var(--bad); box-shadow:0 0 18px rgba(255,56,96,0.35); animation:timer-pulse-red 0.6s infinite; }
.rest-timer.finished { border-color:var(--ok); box-shadow:0 0 24px rgba(0,255,156,0.5); animation:flash-ok 0.5s 3; }
@keyframes timer-pulse-red { 0%,100%{box-shadow:0 0 14px rgba(255,56,96,0.25);} 50%{box-shadow:0 0 22px rgba(255,56,96,0.5);} }
@keyframes flash-ok { 0%,100%{background:var(--bg-2);} 50%{background:rgba(0,255,156,0.12);} }
.rest-timer-label { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--orange); font-weight:700; margin-bottom:4px; display:flex; justify-content:space-between; align-items:center; }
.rest-timer.warn .rest-timer-label { color:var(--amber); }
.rest-timer.urgent .rest-timer-label { color:var(--bad); }
.rest-timer.finished .rest-timer-label { color:var(--ok); }
.rest-timer-hint { font-size:9px; color:var(--ink-faint); letter-spacing:0.05em; text-transform:none; font-weight:400; }
.rest-timer-display { font-family:'Orbitron',monospace; font-weight:900; font-size:44px; color:var(--orange); text-align:center; text-shadow:0 0 12px rgba(255,107,53,0.4); margin:6px 0 4px; letter-spacing:0.05em; transition:color 0.3s; }
.rest-timer.warn .rest-timer-display { color:var(--amber); text-shadow:0 0 12px rgba(255,182,39,0.4); }
.rest-timer.urgent .rest-timer-display { color:var(--bad); text-shadow:0 0 14px rgba(255,56,96,0.5); }
.rest-timer.finished .rest-timer-display { color:var(--ok); text-shadow:0 0 16px rgba(0,255,156,0.6); }
.rest-progress { height:6px; background:var(--bg-3); border:1px solid var(--border); position:relative; overflow:hidden; margin-bottom:12px; }
.rest-progress-fill { position:absolute; top:0; left:0; bottom:0; right:0; background:linear-gradient(90deg,var(--orange),var(--amber)); transform-origin:left; transition:transform 1s linear, background 0.3s; }
.rest-timer.warn .rest-progress-fill { background:var(--amber); }
.rest-timer.urgent .rest-progress-fill { background:var(--bad); }
.rest-timer-btns { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
.rest-timer-btn { padding:11px 4px; background:var(--bg); border:1px solid var(--border-bright); color:var(--ink); font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; cursor:pointer; transition:all 0.15s; }
.rest-timer-btn:hover { border-color:var(--orange); color:var(--orange); }
.rest-timer-btn:active { transform:scale(0.94); }
.rest-timer-btn.stop { border-color:var(--bad); color:var(--bad); }
.rest-timer-btn.add { border-color:var(--cyan-dim); color:var(--cyan); }

/* VITALS */
.hydration { padding:14px; background:var(--bg-2); border:1px solid var(--border); margin-bottom:10px; }
.hydration-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
.hydration-label { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--cyan); font-weight:700; }
.hydration-count { font-family:'Orbitron',monospace; font-size:16px; font-weight:700; color:var(--cyan); }
.hydration-glasses { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; }
.glass { height:28px; border:1.5px solid var(--border-bright); cursor:pointer; background:var(--bg); transition:all 0.15s; }
.glass.full { background:linear-gradient(180deg, transparent 0%, var(--cyan-dim) 100%); border-color:var(--cyan); box-shadow:inset 0 -4px 8px rgba(5,242,219,0.3); }
.glass:active { transform:scale(0.92); }
.sleep-input { padding:14px; background:var(--bg-2); border:1px solid var(--border); margin-bottom:10px; }
.sleep-label { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--magenta); font-weight:700; margin-bottom:8px; }
.sleep-row { display:flex; align-items:center; gap:10px; }
.sleep-row input[type="range"] { flex:1; -webkit-appearance:none; appearance:none; height:4px; background:var(--bg-3); border:1px solid var(--border); outline:none; }
.sleep-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:18px; height:18px; background:var(--magenta); cursor:pointer; box-shadow:0 0 8px rgba(240,65,255,0.5); }
.sleep-row input[type="range"]::-moz-range-thumb { width:18px; height:18px; background:var(--magenta); cursor:pointer; border:none; }
.sleep-value { font-family:'Orbitron',monospace; font-weight:700; font-size:18px; color:var(--magenta); min-width:60px; text-align:right; }
.sleep-hint { font-size:10px; color:var(--ink-dim); margin-top:6px; }
.metric { padding:10px 12px; background:var(--bg-2); border:1px solid var(--border); cursor:pointer; transition:all 0.15s; margin-bottom:10px; }
.metric.on { border-color:var(--ok); background:rgba(0,255,156,0.03); }
.metric-label { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:4px; font-weight:700; }
.metric.on .metric-label { color:var(--ok); }
.metric-value { font-family:'Orbitron',monospace; font-weight:700; font-size:16px; color:var(--ink); }
.metric.on .metric-value { color:var(--ok); }
.metric-hint { font-size:10px; color:var(--ink-faint); margin-top:2px; }

/* WEEK */
.week-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.week-title { font-family:'Orbitron',monospace; font-weight:700; font-size:20px; letter-spacing:0.06em; color:var(--accent); text-shadow:0 0 8px currentColor; }
.week-title span { color:var(--magenta); }
.week-nav { display:flex; gap:4px; }
.week-nav button { width:32px; height:32px; background:var(--bg-2); border:1px solid var(--border); color:var(--accent); font-family:'Orbitron',monospace; font-size:16px; font-weight:700; cursor:pointer; }
.week-nav button:disabled { opacity:0.3; cursor:not-allowed; }
.day-card { display:grid; grid-template-columns:46px 1fr 50px; gap:12px; align-items:center; padding:12px; margin-bottom:6px; background:var(--bg-2); border:1px solid var(--border); transition:all 0.15s; }
.day-card.today { border-color:var(--accent); box-shadow:0 0 10px rgba(5,242,219,0.12); }
.day-card.complete { border-color:rgba(0,255,156,0.3); background:rgba(0,255,156,0.02); }
.day-card.rest-day { opacity:0.6; }
.day-card-dot-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; }
.day-card-day-name { font-family:'Orbitron',monospace; font-weight:700; font-size:14px; color:var(--ink); }
.day-card-day-num { font-size:9px; color:var(--ink-dim); letter-spacing:0.1em; }
.day-card.today .day-card-day-name { color:var(--accent); }
.day-card.complete .day-card-day-name { color:var(--ok); }
.day-card-title { font-size:12px; font-weight:500; color:var(--ink); margin-bottom:2px; }
.day-card-date { font-size:9px; color:var(--ink-dim); letter-spacing:0.12em; text-transform:uppercase; }
.day-card-stat { text-align:right; font-family:'Orbitron',monospace; font-weight:700; font-size:11px; color:var(--ink-dim); }
.day-card.complete .day-card-stat { color:var(--ok); }

/* STATS / PROGRESSION */
.stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:18px; }
.stat-box { padding:14px; background:var(--bg-2); border:1px solid var(--border); }
.stat-box.cyan { border-color:var(--cyan-dim); } .stat-box.magenta { border-color:var(--magenta-dim); }
.stat-box.amber { border-color:rgba(255,182,39,0.3); } .stat-box.orange { border-color:rgba(255,107,53,0.3); }
.stat-box.gold { border-color:rgba(255,217,61,0.3); }
.stat-box-label { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:8px; font-weight:700; }
.stat-box-val { font-family:'Orbitron',monospace; font-weight:900; font-size:26px; line-height:1; }
.stat-box.cyan .stat-box-val { color:var(--cyan); } .stat-box.magenta .stat-box-val { color:var(--magenta); }
.stat-box.amber .stat-box-val { color:var(--amber); } .stat-box.orange .stat-box-val { color:var(--orange); }
.stat-box.gold .stat-box-val { color:var(--gold); }
.stat-box-suffix { font-size:12px; color:var(--ink-dim); margin-left:4px; font-weight:400; }
.streak-box { padding:14px; margin-bottom:14px; background:linear-gradient(135deg, rgba(255,56,96,0.05), rgba(255,182,39,0.03)); border:1px solid rgba(255,56,96,0.3); display:flex; align-items:center; gap:14px; }
.streak-icon { font-family:'Orbitron',monospace; font-weight:900; font-size:32px; color:var(--bad); text-shadow:0 0 12px rgba(255,56,96,0.5); line-height:1; }
.streak-label { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--bad); font-weight:700; }
.streak-val { font-family:'Orbitron',monospace; font-weight:700; font-size:18px; color:var(--ink); }

/* WEEKLY GOAL */
.goal-box { padding:16px; margin-bottom:14px; background:var(--bg-2); border:1px solid var(--accent-dim); }
.goal-title { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); font-weight:700; margin-bottom:10px; }
.goal-bar { height:12px; background:var(--bg-3); border:1px solid var(--border); position:relative; overflow:hidden; margin-bottom:8px; }
.goal-fill { position:absolute; top:0; left:0; bottom:0; background:linear-gradient(90deg, var(--accent-dim), var(--accent)); box-shadow:0 0 8px var(--accent); transition:width 0.6s; }
.goal-text { display:flex; justify-content:space-between; font-size:10px; color:var(--ink-dim); }
.goal-text .done { color:var(--accent); font-weight:700; }

/* BADGES */
.badges-title { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); font-weight:700; margin:20px 0 12px; }
.badge-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.badge { aspect-ratio:1; border:1px solid var(--border); background:var(--bg-2); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px; text-align:center; position:relative; transition:all 0.2s; }
.badge.unlocked { border-color:rgba(255,217,61,0.4); background:linear-gradient(135deg, rgba(255,217,61,0.06), transparent); animation:pop 0.4s; }
.badge.unlocked .badge-icon { color:var(--gold); text-shadow:0 0 10px rgba(255,217,61,0.5); }
.badge-icon { font-family:'Orbitron',monospace; font-weight:900; font-size:22px; color:var(--ink-faint); margin-bottom:4px; }
.badge-name { font-size:8px; letter-spacing:0.05em; color:var(--ink-dim); text-transform:uppercase; line-height:1.2; }

.guide-block h3 { font-family:'Orbitron',monospace; font-weight:700; font-size:14px; letter-spacing:0.08em; color:var(--accent); text-shadow:0 0 6px currentColor; margin-bottom:8px; text-transform:uppercase; }
.guide-block p { font-size:12px; color:var(--ink-dim); line-height:1.65; }

.guide-block ul li::before { content:'▸'; position:absolute; left:0; color:var(--magenta); }
.phase-block { padding:12px; background:var(--bg-3); border-left:2px solid var(--amber); margin-bottom:8px; }
.phase-block-label { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--amber); font-weight:700; margin-bottom:4px; }
.phase-block-text { font-size:11px; color:var(--ink-dim); line-height:1.6; }

.toast-wrap { position:fixed; top:env(safe-area-inset-top); left:0; right:0; z-index:300; display:flex; flex-direction:column; align-items:center; gap:8px; padding-top:16px; pointer-events:none; }
.toast { background:var(--bg-2); border:1px solid var(--accent); padding:10px 18px; font-size:11px; letter-spacing:0.1em; color:var(--accent); box-shadow:0 0 16px rgba(5,242,219,0.2); animation:pop 0.3s; max-width:90%; text-align:center; }

/* INSTALL */
.install-prompt { position:fixed; bottom:env(safe-area-inset-bottom); left:0; right:0; margin:0 12px 12px; background:var(--bg-2); border:1px solid var(--accent); padding:12px 14px; display:flex; align-items:center; gap:12px; font-size:11px; z-index:200; max-width:480px; margin-left:auto; margin-right:auto; transform:translateY(150%); transition:transform 0.4s; box-shadow:0 0 20px rgba(5,242,219,0.15); }

.view-content { animation:fade-in 0.3s; }
input:focus { outline:none; }

// XP par niveau (cumulatif simple : niveau n nécessite n*150 XP)
function xpForLevel(lvl) { return lvl * 150; }
function levelFromXP(xp) {
  let lvl = 1, rem = xp;
  while (rem >= xpForLevel(lvl)) { rem -= xpForLevel(lvl); lvl++; }
  return { level: lvl, current: rem, needed: xpForLevel(lvl) };
}

function storeKey(pid) { return STORE_PREFIX + pid; }
function loadProfile(pid) {
  try {
    const raw = localStorage.getItem(storeKey(pid));
    if (raw) {
      const p = JSON.parse(raw);
      if(!p.days) p.days={};
      if(p.xp===undefined) p.xp=0;
      if(!p.unlockedBadges) p.unlockedBadges=[];
      return p;
    }
  } catch(e){}
  return { days:{}, xp:0, unlockedBadges:[], firstLaunch:null };
}
function saveProfile() {
  if (!activeProfile) return;
  try { localStorage.setItem(storeKey(activeProfile), JSON.stringify(state)); } catch(e){}
}
function profileExists(pid) { return localStorage.getItem(storeKey(pid)) !== null; }

// Date de premier lancement du profil (J1). Définie au tout premier render.
function ensureFirstLaunch() {
  if(!state.firstLaunch){
    const d=new Date(); d.setHours(0,0,0,0);
    state.firstLaunch = d.getTime();
    saveProfile();
  }
}
function getStartDate() {
  if(state && state.firstLaunch){ const d=new Date(state.firstLaunch); d.setHours(0,0,0,0); return d; }
  const d=new Date(); d.setHours(0,0,0,0); return d;
}

// Index du jour courant depuis le 1er lancement (0 = J1)
function getDayIndex() {
  const now=new Date(); now.setHours(0,0,0,0);
  const start=getStartDate();
  return Math.floor((now-start)/86400000);
}
function dateForDay(idx){ const d=getStartDate(); d.setDate(d.getDate()+idx); return d; }
function fmtDate(d){ return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}).toUpperCase(); }
function getWeekNum(idx){ return Math.floor(idx/7)+1; }

// Jour de la semaine (JS getDay 0=Dim..6=Sam) pour un index de jour
function weekdayForDay(idx){ return dateForDay(idx).getDay(); }
// Type de jour selon le jour de la semaine réel
function dayTypeForDay(idx){ return DAY_TYPE_BY_WEEKDAY[weekdayForDay(idx)]; }

function videoURL(exName){
  return 'https://www.youtube.com/results?search_query='+encodeURIComponent(exName+' technique exercice musculation');
}
function machineURL(exName){
  return 'https://www.google.com/search?tbm=isch&q='+encodeURIComponent(exName+' machine salle de sport');
}
// Icônes SVG inline
const IC_PLAY='<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
const IC_MACHINE='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="11" rx="1"/><path d="M7 8V5h10v3M9 19v2M15 19v2"/></svg>';
const IC_TIMER='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M9 2h6"/></svg>';
// Bloc visuel : illustration + boutons (vidéo démo + voir la machine).
// stopAttr: à passer pour les éléments dans une zone cliquable (cardio/étirement) pour ne pas déclencher le toggle.
function vizBlock(ex, opts){
  opts=opts||{};
  const stop = opts.stop ? 'data-stop="1"' : '';
  const showMachine = (ex.machine || opts.forceMachine);
  return `
    <div class="exo-viz">
      <div class="exo-viz-svg">${vizSVG(ex.viz)}</div>
      <div class="exo-viz-actions">
        <a class="exo-act-btn video" href="${videoURL(ex.name)}" target="_blank" rel="noopener" ${stop}><span class="ic">${IC_PLAY}</span><span class="lbl">Voir la démo vidéo</span><span class="arr">↗</span></a>
        ${showMachine?`<a class="exo-act-btn machine" href="${machineURL(ex.name)}" target="_blank" rel="noopener" ${stop}><span class="ic">${IC_MACHINE}</span><span class="lbl">Voir la machine</span><span class="arr">↗</span></a>`:''}
      </div>
    </div>`;
}

// Liste d'étirements ou yoga en cartes riches (illustration + vidéo + timer)
function renderRoutineList(items, kind, idx, doneMap){
  return items.map((it,i)=>{
    const ck=doneMap[i]||false;
    return `
      <div class="stretch-card ${ck?'done':''}">
        <div class="stretch-head">
          <div class="stretch-svg">${vizSVG(it.viz)}</div>
          <div class="stretch-info">
            <div class="stretch-name">${it.name}</div>
            <div class="stretch-target">${it.target}</div>
            <div class="stretch-btns">
              <button class="stretch-btn timer" data-action="hold-timer" data-kind="${kind}" data-idx="${i}"><span class="ic">${IC_TIMER}</span>Lancer</button>
              <a class="stretch-btn video" href="${videoURL(it.name+' étirement')}" target="_blank" rel="noopener"><span class="ic">${IC_PLAY}</span>Démo</a>
            </div>
          </div>
          <div class="stretch-checkbox" data-action="${kind}" data-day="${idx}" data-idx="${i}"></div>
        </div>
      </div>`;
  }).join('');
}

// Quelle session de sport pour un jour d'entraînement donné.
// On fait tourner les séances dans l'ordre chronologique des jours d'entraînement
// depuis le 1er lancement, pour garder la variété.
function sessionForDay(idx) {
  const p = getProfile();
  if (dayTypeForDay(idx) !== 'train') return null;
  let trainCount = 0;
  for (let i=0; i<=idx; i++) if (dayTypeForDay(i)==='train') trainCount++;
  return p.sessions[(trainCount-1) % p.sessions.length];
}
function getPhase(week) {
  const p = getProfile();
  return p.phases.find(ph=>ph.weeks.includes(week)) || p.phases[0];
}

function getDay(idx) {
  const k='d'+idx;
  if(!state.days[k]) state.days[k]={ exercises:{}, sets:{}, cardioSteps:{}, stretches:{}, yoga:{}, sleep:0, nutrition:false, validated:false };
  const d=state.days[k];
  ['exercises','sets','cardioSteps','stretches','yoga'].forEach(f=>{ if(!d[f]) d[f]={}; });
  if(d.sleep===undefined)d.sleep=0;
  if(d.nutrition===undefined)d.nutrition=false;
  if(d.validated===undefined)d.validated=false;
  return d;
}

// Récupère (ou initialise) le tableau de séries d'un exercice musculaire
function getSets(d, exIdx, nbSets) {
  if(!d.sets[exIdx] || d.sets[exIdx].length!==nbSets){
    const prev = d.sets[exIdx] || [];
    const arr=[];
    for(let s=0;s<nbSets;s++){
      arr.push(prev[s] || { done:false, reps:'', weight:'' });
    }
    d.sets[exIdx]=arr;
  }
  return d.sets[exIdx];
}

// Un exercice musculaire est "fait" si toutes ses séries sont cochées
function exDone(d, ex, exIdx) {
  if(ex.cardioStep) return !!d.cardioSteps[exIdx];
  if(!ex.sets) return !!d.exercises[exIdx]; // sécurité (gainage simple)
  const arr=d.sets[exIdx];
  if(!arr || arr.length!==ex.sets) return false;
  return arr.every(s=>s.done);
}

// Retrouve le dernier poids saisi sur un exercice (par son nom) avant le jour donné.
// Prend le poids le plus lourd parmi les séries de ce jour-là.
function lastWeightFor(exName, beforeIdx) {
  for(let i=beforeIdx-1;i>=0;i--){
    const d=state.days['d'+i];
    if(!d||!d.sets) continue;
    const sess=sessionForDay(i);
    if(!sess) continue;
    for(let j=0;j<sess.exercises.length;j++){
      if(sess.exercises[j].name===exName && d.sets[j]){
        let maxW=null;
        d.sets[j].forEach(s=>{
          const w=parseFloat(s.weight);
          if(!isNaN(w) && (maxW===null || w>maxW)) maxW=w;
        });
        if(maxW!==null) return maxW;
      }
    }
  }
  return null;
}

function computeStats() {
  const todayIdx=getDayIndex();
  let totalWorkouts=0, sleepDays=0, nutritionDays=0, cardioCount=0;
  let currentStreak=0, maxStreak=0, runStreak=0;
  for(let i=0;i<TOTAL_DAYS;i++){
    const d=state.days['d'+i]; if(!d) { if(dayTypeForDay(i)==='train' && i<=todayIdx) runStreak=0; continue; }
    const complete = d.validated===true;
    if(complete){ totalWorkouts++; runStreak++; maxStreak=Math.max(maxStreak,runStreak); }
    else if(dayTypeForDay(i)==='train' && i<=todayIdx){ runStreak=0; }
    if(d.cardioSteps) cardioCount += Object.values(d.cardioSteps).filter(Boolean).length;
    if(d.sleep>=7) sleepDays++;
    if(d.nutrition) nutritionDays++;
  }
  for(let i=Math.min(todayIdx,TOTAL_DAYS-1);i>=0;i--){
    if(dayTypeForDay(i)!=='train') continue;
    const d=state.days['d'+i]; if(!d||!d.validated) break;
    currentStreak++;
  }
  const lv=levelFromXP(state.xp);
  return { totalWorkouts, sleepDays, nutritionDays, cardioCount, currentStreak, maxStreak, level:lv.level, xp:state.xp };
}

// XP award + badge check + toasts. amount peut être négatif (décochage).
function awardXP(amount, label) {
  const before=levelFromXP(state.xp).level;
  state.xp = Math.max(0, state.xp + amount);
  const after=levelFromXP(state.xp).level;
  const sign = amount>=0 ? '+' : '';
  showToast(sign+amount+' XP'+(label?' · '+label:''), amount>=0?'xp':'xp-neg');
  if(after>before) setTimeout(()=>showToast('NIVEAU '+after+' !', 'levelup'), 400);
  if(amount>0) checkBadges();
  saveProfile();
}

// Validation explicite de la séance : donne le bonus, verrouille
function validateSession(idx) {
  const d=getDay(idx);
  const sess=sessionForDay(idx);
  if(!sess || d.validated) return;
  const total=sess.exercises.length;
  const done=Object.values(d.exercises).filter(Boolean).length;
  if(done<total) return; // sécurité
  d.validated=true;
  awardXP(sess.xp, 'SÉANCE '+sess.name);
  if(navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
  saveProfile();
  render();
}
function checkBadges() {
  const stats=computeStats();
  BADGES.forEach(b=>{
    if(!state.unlockedBadges.includes(b.id) && b.check(stats)) {
      state.unlockedBadges.push(b.id);
      setTimeout(()=>showToast('BADGE · '+b.name, 'badge'), 800);
    }
  });
}
let toastTimeout=null;
function showToast(msg, type) {
  const wrap=document.getElementById('toast-wrap');
  const t=document.createElement('div');
  t.className='toast '+(type||'');
  t.innerHTML = msg;
  wrap.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity 0.4s'; t.style.opacity='0'; setTimeout(()=>t.remove(),400); }, 2200);
}

  sess.exercises.forEach((ex,i)=>{ if(exDone(dd,ex,i)) done++; });
  const stretchDone=Object.values(dd.stretches||{}).filter(Boolean).length;

  let html=`

            <div class="cardio-step-intensity">${ex.intensity}</div>

          </div>
          <div class="cardio-step-check"></div>
        </div>
      `;
    }

    // ---- STRENGTH EXERCISE WITH SETS ----
    const isDone=exDone(dd,ex,i);
    let tagClass = ex.machine?'machine':'libre';
    let tagText = ex.machine?'MACHINE':'POIDS LIBRE';
    const baseTag = ex.compound?`<span class="exo-tag base">EXO DE BASE</span>`:'';

    // prescription text
    const presc = ex.sets ? `${ex.sets} séries × ${ex.reps}` : ex.reps;

    let setsHtml='';
    if(ex.sets){
      const arr=getSets(dd, i, ex.sets);
      const showWeight = ex.weighted;
      setsHtml=`
        <div class="sets">
          <div class="set-head"><span></span><span>Reps</span><span>${showWeight?'Poids (kg)':'—'}</span><span>OK</span></div>
          ${arr.map((s,si)=>`
            <div class="set-row ${s.done?'done':''}">
              <div class="set-idx">S${si+1}</div>
              <input class="set-input" type="number" inputmode="numeric" placeholder="${ex.reps.replace(/[^0-9]/g,'')||'—'}" value="${s.reps}" data-action="set-reps" data-day="${idx}" data-ex="${i}" data-set="${si}" />
              ${showWeight
                ? `<input class="set-input" type="number" inputmode="decimal" step="0.5" placeholder="0" value="${s.weight}" data-action="set-weight" data-day="${idx}" data-ex="${i}" data-set="${si}" />`

            </div>
          `).join('')}
        </div>
      `;

    // last weight hint

  // Rest timer

  `;

  // Récup
  html+=`<div class="section-label">Récupération <span class="count">bonus XP</span></div>`;
  html+=`<button class="collapse-btn ${openSections.stretches?'open':''}" data-toggle="stretches"><span>Étirements (${stretchDone}/${STRETCHES.length}) · +15 XP</span><span class="arrow">▸</span></button>`;
  html+=openSections.stretches?`<div class="collapse-body">${renderRoutineList(STRETCHES,'stretch',idx,dd.stretches)}</div>`:'';

  html+=renderVitals(idx, dd);
  return html;
}

  const weekStart=(viewWeek-1)*7;
  return `

      <div class="week-title">SEMAINE <span>${String(viewWeek).padStart(2,'0')}</span></div>

    </div>
    ${[0,1,2,3,4,5,6].map(i=>{
      const dayIdx=weekStart+i;
      const dt=dayTypeForDay(dayIdx);
      const sess=sessionForDay(dayIdx);
      const dd=state.days['d'+dayIdx];
      const total=sess?sess.exercises.length:0;
      let done=0;
      if(dd&&sess) sess.exercises.forEach((ex,ei)=>{ if(exDone(dd,ex,ei)) done++; });
      const isToday=dayIdx===todayIdx;
      const complete=dd&&dd.validated===true;
      let cls='day-card'; if(isToday)cls+=' today'; if(complete)cls+=' complete'; if(dt!=='train')cls+=' rest-day';
      let title, stat;
      if(dt==='off'){ title='Repos total'; stat='—'; }
      else if(dt==='stretch'){ title='Étirements · Souplesse'; stat='○'; }
      else { title=sess.name+' · '+sess.sub.split('·')[0].trim(); stat=done+'/'+total; }
      return `<div class="${cls}">
        <div class="day-card-dot-wrap"><div class="day-card-day-name">${WEEKDAY_FR[weekdayForDay(dayIdx)]}</div><div class="day-card-day-num">J${String(dayIdx+1).padStart(2,'0')}</div></div>
        <div><div class="day-card-title">${title}</div><div class="day-card-date">${fmtDate(dateForDay(dayIdx))}</div></div>
        <div class="day-card-stat">${stat}</div>
      </div>`;
    }).join('')}
  `;
}

function formatTimer(s){ const m=Math.floor(s/60),sec=s%60; return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); }

// Bip sonore généré (Web Audio, pas de fichier, marche hors-ligne)
function beep(freq, dur, when){
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const t=audioCtx.currentTime+(when||0);
    const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
    osc.frequency.value=freq; osc.type='sine';
    gain.gain.setValueAtTime(0.0001,t);
    gain.gain.exponentialRampToValueAtTime(0.4,t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t+dur);
  }catch(e){}
}
function finishSound(){ beep(660,0.15,0); beep(880,0.25,0.18); } // deux notes montantes

function timerState(){
  if(!restTimer.running && restTimer.seconds===0) return '';
  if(restTimer.seconds<=3 && restTimer.seconds>0) return 'urgent';
  if(restTimer.seconds<=10 && restTimer.seconds>0) return 'warn';
  return '';
}
function updateTimerDisplay(){
  const wrap=document.getElementById('rest-timer');
  const disp=document.getElementById('timer-display');
  const fill=document.getElementById('rest-progress-fill');
  if(disp) disp.textContent=formatTimer(restTimer.seconds);
  if(fill){
    const pct = restTimer.total>0 ? (restTimer.seconds/restTimer.total) : 0;
    fill.style.transform='scaleX('+Math.max(0,pct)+')';
  }
  if(wrap){
    wrap.classList.remove('warn','urgent','finished');
    const st=timerState();
    if(st) wrap.classList.add(st);
  }
}
function startTimer(sec){
  stopTimer();
  restTimer.seconds=sec; restTimer.total=sec; restTimer.running=true;
  updateTimerDisplay();
  // bip discret au démarrage pour confirmer
  beep(440,0.08,0);
  restTimer.interval=setInterval(()=>{
    restTimer.seconds--;
    // bips de décompte sur les 3 dernières secondes
    if(restTimer.seconds<=3 && restTimer.seconds>0) beep(560,0.08,0);
    if(restTimer.seconds<=0){
      clearInterval(restTimer.interval); restTimer.interval=null; restTimer.running=false; restTimer.seconds=0;
      finishSound();
      if(navigator.vibrate) navigator.vibrate([200,100,200,100,300]);
      // flash "fini"
      const wrap=document.getElementById('rest-timer');
      const disp=document.getElementById('timer-display');
      if(wrap){ wrap.classList.remove('warn','urgent'); wrap.classList.add('finished'); }
      if(disp){ disp.textContent='GO !'; }
      const fill=document.getElementById('rest-progress-fill');
      if(fill) fill.style.transform='scaleX(0)';
      setTimeout(()=>{ const w=document.getElementById('rest-timer'); if(w) w.classList.remove('finished'); const d=document.getElementById('timer-display'); if(d&&!restTimer.running) d.textContent='00:00'; },2000);
      return;
    }
    updateTimerDisplay();
  },1000);
}
function stopTimer(){ if(restTimer.interval)clearInterval(restTimer.interval); restTimer.interval=null; restTimer.running=false; updateTimerDisplay(); }

// === HOLD TIMER (étirement / yoga) plein écran ===
let holdTimer={ interval:null, remaining:0, total:0, phase:0, item:null };
function openHoldTimer(item){
  closeHoldTimer();
  holdTimer.item=item;
  holdTimer.total=item.secs||30;
  holdTimer.remaining=holdTimer.total;
  holdTimer.phase=item.perSide?1:0; // 1 = premier côté, 2 = deuxième
  renderHoldTimer();
  startHoldCountdown();
}
function startHoldCountdown(){
  if(holdTimer.interval) clearInterval(holdTimer.interval);
  beep(440,0.08,0);
  holdTimer.interval=setInterval(()=>{
    holdTimer.remaining--;
    if(holdTimer.remaining<=3 && holdTimer.remaining>0) beep(560,0.08,0);
    if(holdTimer.remaining<=0){
      clearInterval(holdTimer.interval); holdTimer.interval=null;
      finishSound(); if(navigator.vibrate) navigator.vibrate([200,100,200]);
      if(holdTimer.phase===1){
        // passer au 2e côté
        holdTimer.phase=2; holdTimer.remaining=holdTimer.total;
        updateHoldDisplay(); renderHoldTimer();
        setTimeout(startHoldCountdown, 800);
      } else {
        updateHoldDisplay(true);
      }
      return;
    }
    updateHoldDisplay();
  },1000);
}
function updateHoldDisplay(finished){
  const num=document.getElementById('hold-num');
  const ring=document.getElementById('hold-ring-fg');
  if(num) num.textContent= finished ? '✓' : holdTimer.remaining;
  if(ring){
    const C=2*Math.PI*92;
    const frac= finished ? 0 : (holdTimer.remaining/holdTimer.total);
    ring.style.strokeDasharray=C;
    ring.style.strokeDashoffset=C*(1-frac);
  }
}
function renderHoldTimer(){
  let ov=document.getElementById('hold-overlay');
  const it=holdTimer.item; if(!it) return;
  const C=2*Math.PI*92;
  const sideLabel = it.perSide ? (holdTimer.phase===1?'CÔTÉ 1 / 2':'CÔTÉ 2 / 2') : '';
  const html=`
    <div class="hold-timer-svg">${vizSVG(it.viz)}</div>
    <div class="hold-timer-name">${it.name}</div>
    ${sideLabel?`<div class="hold-timer-side">${sideLabel}</div>`:'<div style="height:8px;"></div>'}
    <div class="hold-ring-wrap">
      <svg viewBox="0 0 200 200"><circle class="hold-ring-bg" cx="100" cy="100" r="92"/><circle id="hold-ring-fg" class="hold-ring-fg" cx="100" cy="100" r="92" style="stroke-dasharray:${C};stroke-dashoffset:0;"/></svg>
      <div class="hold-ring-num" id="hold-num">${holdTimer.remaining}</div>
    </div>
    <div class="hold-timer-btns">
      <button class="hold-timer-btn" data-action="hold-close">Fermer</button>
      <button class="hold-timer-btn done-btn" data-action="hold-done">Terminé ✓</button>
    </div>
  `;
  if(!ov){
    ov=document.createElement('div'); ov.id='hold-overlay'; ov.className='hold-timer-overlay';
    document.body.appendChild(ov);
  }
  ov.innerHTML=html;
  updateHoldDisplay();
  ov.querySelector('[data-action="hold-close"]').addEventListener('click', closeHoldTimer);
  ov.querySelector('[data-action="hold-done"]').addEventListener('click', ()=>{
    const kind=holdTimer.kind, idx=holdTimer.dayIdx, i=holdTimer.itemIdx;
    closeHoldTimer();
    if(kind!=null && idx!=null) markRoutineDone(kind, idx, i);
  });
}
function closeHoldTimer(){
  if(holdTimer.interval){ clearInterval(holdTimer.interval); holdTimer.interval=null; }
  const ov=document.getElementById('hold-overlay'); if(ov) ov.remove();
}
// Coche un étirement/yoga (depuis le bouton Terminé du hold timer)
function markRoutineDone(kind, idx, i){
  const d=getDay(idx);
  const map = kind==='stretch' ? d.stretches : d.yoga;
  if(!map[i]){
    map[i]=true;
    const list = kind==='stretch'?STRETCHES:YOGA;
    const allDone=Object.values(map).filter(Boolean).length===list.length;
    const flag = kind==='stretch'?'stretchAwarded':'yogaAwarded';
    const xp = kind==='stretch'?15:20;
    if(allDone && !d[flag]){ d[flag]=true; awardXP(xp, kind==='stretch'?'Étirements':'Yoga'); }
    saveProfile(); render();
  }
}

// ============================================================
// LISTENERS
// ============================================================
function attachListeners() {
  document.querySelectorAll('[data-action="switch-profile"]').forEach(el=>el.addEventListener('click',()=>{
    stopTimer(); activeProfile=null; state=null; renderProfileSelect();
  }));
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{
    currentView=el.dataset.tab; if(currentView!=='week')state.viewWeek=null; render();
  }));
  // Cocher une série : XP symétrique. Le bonus de séance se déclenche à la validation.
  document.querySelectorAll('[data-action="set-toggle"]').forEach(el=>el.addEventListener('click',()=>{
    const idx=parseInt(el.dataset.day), exi=parseInt(el.dataset.ex), si=parseInt(el.dataset.set);
    const d=getDay(idx); const sess=sessionForDay(idx); const ex=sess.exercises[exi];
    const arr=getSets(d, exi, ex.sets);
    const was=arr[si].done;
    arr[si].done=!was;
    const perSet=Math.max(1, Math.round(ex.xp/ex.sets));
    awardXP(was ? -perSet : perSet);
    if(was && d.validated){ d.validated=false; awardXP(-sess.xp,'Séance annulée'); }
    // Lancement auto du chrono quand on COCHE une série (pas au décochage).
    // On ne lance pas si c'est la toute dernière série du dernier exercice (séance finie).
    let autoStart=0;
    if(!was){
      const restSec = ex.rest || 90;
      // dernière série de cet exo ?
      const lastSetOfEx = (si === ex.sets-1);
      const lastEx = (exi === sess.exercises.length-1);
      if(!(lastSetOfEx && lastEx)) autoStart=restSec;
    }
    saveProfile(); render();
    if(autoStart>0){
      startTimer(autoStart);
      // petit scroll fluide vers le chrono pour le voir tout de suite
      requestAnimationFrame(()=>{
        const t=document.getElementById('rest-timer');
        if(t) t.scrollIntoView({ behavior:'smooth', block:'center' });
      });
    }
  }));
  // Saisie reps par série
  document.querySelectorAll('[data-action="set-reps"]').forEach(el=>{
    el.addEventListener('click',(e)=>e.stopPropagation());
    el.addEventListener('change',(e)=>{
      const idx=parseInt(el.dataset.day), exi=parseInt(el.dataset.ex), si=parseInt(el.dataset.set);
      const d=getDay(idx); const sess=sessionForDay(idx); const ex=sess.exercises[exi];
      const arr=getSets(d, exi, ex.sets);
      arr[si].reps=e.target.value; saveProfile();
    });
  });
  // Saisie poids par série
  document.querySelectorAll('[data-action="set-weight"]').forEach(el=>{
    el.addEventListener('click',(e)=>e.stopPropagation());
    el.addEventListener('change',(e)=>{
      const idx=parseInt(el.dataset.day), exi=parseInt(el.dataset.ex), si=parseInt(el.dataset.set);
      const d=getDay(idx); const sess=sessionForDay(idx); const ex=sess.exercises[exi];
      const arr=getSets(d, exi, ex.sets);
      arr[si].weight=e.target.value; saveProfile(); render(); // render pour MAJ le rappel de charge
    });
  });

  // Validation de séance
  document.querySelectorAll('[data-action="validate"]').forEach(el=>el.addEventListener('click',()=>{
    validateSession(parseInt(el.dataset.day));
  }));

  // Étape cardio (cochage simple, XP symétrique)
  document.querySelectorAll('[data-action="cardiostep"]').forEach(el=>el.addEventListener('click',(e)=>{
    if(e.target.closest('[data-stop]')) return; // clic sur le lien démo : ne pas cocher
    const idx=parseInt(el.dataset.day), i=parseInt(el.dataset.idx);
    const d=getDay(idx); const sess=sessionForDay(idx); const ex=sess.exercises[i];
    const was=d.cardioSteps[i]||false; d.cardioSteps[i]=!was;
    awardXP(was ? -ex.xp : ex.xp, 'Cardio');
    if(was && d.validated){ d.validated=false; awardXP(-sess.xp,'Séance annulée'); }
    saveProfile(); render();
  }));
  // Liens démo : empêcher la propagation (ouvrent juste le lien)
  document.querySelectorAll('[data-stop]').forEach(el=>el.addEventListener('click',(e)=>e.stopPropagation()));
  // Bouton "Lancer" : ouvre le timer plein écran pour l'étirement/yoga
  document.querySelectorAll('[data-action="hold-timer"]').forEach(el=>el.addEventListener('click',(e)=>{
    e.stopPropagation();
    const kind=el.dataset.kind, i=parseInt(el.dataset.idx);
    const list = kind==='stretch'?STRETCHES:YOGA;
    const item=list[i];
    holdTimer.kind=kind; holdTimer.dayIdx=getDayIndex(); holdTimer.itemIdx=i;
    openHoldTimer(item);
  }));
  document.querySelectorAll('[data-action="stretch"]').forEach(el=>el.addEventListener('click',()=>{
    const idx=parseInt(el.dataset.day), i=el.dataset.idx; const d=getDay(idx);
    const was=d.stretches[i]||false; d.stretches[i]=!was;
    const allDone=Object.values(d.stretches).filter(Boolean).length===STRETCHES.length;
    if(allDone && !d.stretchAwarded){ d.stretchAwarded=true; awardXP(15,'Étirements'); }
    else if(!allDone && d.stretchAwarded){ d.stretchAwarded=false; awardXP(-15,'Étirements'); }
    saveProfile(); render();
  }));
  document.querySelectorAll('[data-action="yoga"]').forEach(el=>el.addEventListener('click',()=>{
    const idx=parseInt(el.dataset.day), i=el.dataset.idx; const d=getDay(idx);
    const was=d.yoga[i]||false; d.yoga[i]=!was;
    const allDone=Object.values(d.yoga).filter(Boolean).length===YOGA.length;
    if(allDone && !d.yogaAwarded){ d.yogaAwarded=true; awardXP(20,'Yoga'); }
    else if(!allDone && d.yogaAwarded){ d.yogaAwarded=false; awardXP(-20,'Yoga'); }
    saveProfile(); render();
  }));
  document.querySelectorAll('[data-action="sleep"]').forEach(el=>{
    el.addEventListener('input',(e)=>{
      const idx=parseInt(el.dataset.day), v=parseFloat(e.target.value); getDay(idx).sleep=v;
      const disp=document.getElementById('sleep-val-'+idx); if(disp)disp.innerHTML=v+'<span style="font-size:11px;">h</span>';
    });
    el.addEventListener('change',()=>{
      const idx=parseInt(el.dataset.day); const d=getDay(idx);
      if(d.sleep>=7 && !d.sleepAwarded){ d.sleepAwarded=true; awardXP(10,'Bon sommeil'); }
      saveProfile();
    });
  });
  document.querySelectorAll('[data-action="nutrition"]').forEach(el=>el.addEventListener('click',()=>{
    const idx=parseInt(el.dataset.day); const d=getDay(idx); const was=d.nutrition; d.nutrition=!was;
    awardXP(was ? -15 : 15,'Nutrition');
    saveProfile(); render();
  }));
  document.querySelectorAll('[data-toggle]').forEach(el=>el.addEventListener('click',()=>{ openSections[el.dataset.toggle]=!openSections[el.dataset.toggle]; render(); }));
  document.querySelectorAll('[data-timer]').forEach(el=>el.addEventListener('click',()=>{
    const v=el.dataset.timer;
    if(v==='stop'){ stopTimer(); restTimer.seconds=0; restTimer.total=0; updateTimerDisplay(); }
    else if(v==='add'){
      // +30s : prolonge le chrono en cours, ou démarre un 30s si arrêté
      if(restTimer.running){ restTimer.seconds+=30; restTimer.total+=30; updateTimerDisplay(); }
      else startTimer(30);
    }
    else startTimer(parseInt(v));
  }));
  const prev=document.querySelector('[data-action="prev-week"]'); if(prev)prev.addEventListener('click',()=>{state.viewWeek=Math.max(1,state.viewWeek-1);render();});
  const next=document.querySelector('[data-action="next-week"]'); if(next)next.addEventListener('click',()=>{state.viewWeek=Math.min(6,state.viewWeek+1);render();});
  const reset=document.querySelector('[data-action="reset"]'); if(reset)reset.addEventListener('click',()=>{
    if(confirm('// RESET CE PROFIL ? XP, badges et progression seront effacés.')){
      state={days:{},xp:0,unlockedBadges:[]}; saveProfile(); render();
    }
  });
  const resetAll=document.querySelector('[data-action="reset-all"]'); if(resetAll)resetAll.addEventListener('click',()=>{
    if(confirm('// RESET TOTAL ? La progression des DEUX profils sera entièrement effacée. Action irréversible.')){
      if(confirm('Es-tu vraiment sûr ? Tout sera remis à zéro.')){
        // Efface toutes les clés de l'app
        Object.keys(localStorage).forEach(k=>{ if(k.indexOf(STORE_PREFIX)===0) localStorage.removeItem(k); });
        localStorage.removeItem('ascend_install_dismissed');
        stopTimer();
        activeProfile=null; state=null;
        renderProfileSelect();
      }
    }
  });
}

  b.id='update-banner';
  b.style.cssText='position:fixed;top:env(safe-area-inset-top);left:0;right:0;z-index:400;background:var(--gold);color:#05060c;padding:12px 16px;display:flex;align-items:center;gap:12px;font-family:JetBrains Mono,monospace;font-size:11px;max-width:480px;margin:8px auto 0;box-shadow:0 0 20px rgba(255,217,61,0.4);';
  b.innerHTML='<div style="flex:1;"><strong style="font-family:Orbitron,monospace;letter-spacing:0.1em;">NOUVELLE VERSION DISPO</strong><div style="margin-top:2px;">v'+remoteVersion+' · ta progression est conservée</div></div><button id="update-btn" style="background:#05060c;color:var(--gold);border:none;padding:8px 14px;font-family:Orbitron,monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;cursor:pointer;">METTRE À JOUR</button>';
  document.body.appendChild(b);
  document.getElementById('update-btn').addEventListener('click', forceUpdate);
}

function forceUpdate() {
  // Casse tous les caches possibles puis recharge avec un paramètre anti-cache.
  try {
    if('caches' in window){ caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))); }
  } catch(e){}
  const url = location.origin + location.pathname + '?v=' + Date.now();
  location.replace(url);
}

function checkForUpdate() {
  // version.json doit contenir : {"version": N}  (N = même numéro qu'APP_VERSION au déploiement)
  const url = 'version.json?t=' + Date.now(); // cache-busting
  fetch(url, { cache:'no-store' })
    .then(r=> r.ok ? r.json() : null)
    .then(data=>{
      if(data && typeof data.version==='number' && data.version > APP_VERSION){
        showUpdateBanner(data.version);
      }
    })
    .catch(()=>{ /* hors-ligne ou pas de version.json : on ignore silencieusement */ });
}

// ============================================================
// INIT
// ============================================================
// Si on vient d'un rechargement forcé (?v=...), on nettoie l'URL proprement
if(location.search.indexOf('v=')!==-1){
  history.replaceState(null,'',location.origin+location.pathname);
}

const last=localStorage.getItem(STORE_PREFIX+'last');
if(last && PROFILES[last]){ activeProfile=last; state=loadProfile(last); if(!state.unlockedBadges)state.unlockedBadges=[]; render(); }
else { renderProfileSelect(); }

// Vérifie les MAJ au démarrage, puis à chaque retour sur l'app (réveil d'écran, refocus)
checkForUpdate();
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) checkForUpdate(); });
window.addEventListener('focus', checkForUpdate);

(function(){
  const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone===true;
  if(isIOS && !isStandalone && !localStorage.getItem('ascend_install_dismissed')){
    setTimeout(()=>{
      const p=document.createElement('div'); p.className='install-prompt';
      p.innerHTML=`<div style="flex:1;"><strong>// INSTALLER ASCEND</strong><div style="color:var(--ink-dim);">Partager ⎙ → "Sur l'écran d'accueil"</div></div><button class="install-prompt-close">OK</button>`;
      document.body.appendChild(p); setTimeout(()=>p.classList.add('show'),100);
      p.querySelector('button').addEventListener('click',()=>{ localStorage.setItem('ascend_install_dismissed','1'); p.classList.remove('show'); setTimeout(()=>p.remove(),400); });
    },2500);
  }
})();
</script>
</body>
